name: Claude API Task Runner

on:
  workflow_dispatch: {}   # Chaile GitHub Actions tab theke manually o chalate parben

  schedule:
    # Eta protidin 15 min por por check korte thakbe je "ekhon ki config.json
    # e deya somoy?" - mile gele kaj cholbe, na mille kichu na kore ber hoye
    # jabe (extra kaj/limit khoroch hobe na). Somoy change korte chaile EI
    # YAML file na, `config.json` file edit korun.
    - cron: "*/15 * * * *"

permissions:
  contents: write   # progress.json commit kore repo te push korar jonno lagbe

jobs:
  run-task:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run task (resumes from last saved progress)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run.py

      - name: Save progress back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.json
          git diff --cached --quiet || git commit -m "Update progress [skip ci]"
          git push
